<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src {{cspSource}} data: blob:; style-src {{cspSource}} 'unsafe-inline'; script-src {{cspSource}} 'nonce-{{nonce}}';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hex4Code</title>
  <link rel="stylesheet" href="{{cssUri}}">
</head>
<body>
  <div class="app">
    <div class="header-container">
      <div class="header-left">
        <div class="session-selector" id="sessionSelector">
          <div class="session-selector-title" id="sessionSelectorTitle">
            <img class="session-logo" src="{{iconUri}}" alt="" />
            <span class="session-title-text" id="sessionSelectorTitleText">Hex4Code</span>
          </div>
          <svg class="session-selector-icon" viewBox="0 0 1024 1024" aria-hidden="true">
            <path d="M884 256h-75c-5.1 0-9.9 2.5-12.9 6.6L512 654.2 227.9 262.6c-3-4.1-7.8-6.6-12.9-6.6h-75c-6.5 0-10.3 7.4-6.5 12.7l352.6 486.1c12.8 17.6 39 17.6 51.7 0l352.6-486.1c3.9-5.3.1-12.7-6.4-12.7z"></path>
          </svg>
        </div>
      </div>
      <button class="header-new-btn" id="newSessionBtn" title="New chat">
        <svg class="header-new-icon" viewBox="0 0 1024 1024" width="16" height="16" aria-hidden="true">
          <path d="M474 152m8 0l60 0q8 0 8 8l0 704q0 8-8 8l-60 0q-8 0-8-8l0-704q0-8 8-8Z"></path>
          <path d="M168 474m8 0l672 0q8 0 8 8l0 60q0 8-8 8l-672 0q-8 0-8-8l0-60q0-8 8-8Z"></path>
        </svg>
      </button>
      <div class="session-dropdown" id="sessionDropdown"></div>
    </div>

    <div class="model-toolbar" id="modelToolbar">
      <button class="model-selector" id="modelSelector" title="Select model">
        <span class="model-provider-dot" id="modelProviderDot"></span>
        <span class="model-selector-main">
          <span class="model-selector-label" id="modelSelectorLabel">Loading model...</span>
          <span class="model-selector-subtitle" id="modelSelectorSubtitle">Resolver state</span>
        </span>
        <svg class="model-selector-icon" viewBox="0 0 1024 1024" aria-hidden="true">
          <path d="M884 256h-75c-5.1 0-9.9 2.5-12.9 6.6L512 654.2 227.9 262.6c-3-4.1-7.8-6.6-12.9-6.6h-75c-6.5 0-10.3 7.4-6.5 12.7l352.6 486.1c12.8 17.6 39 17.6 51.7 0l352.6-486.1c3.9-5.3.1-12.7-6.4-12.7z"></path>
        </svg>
      </button>
      <button class="model-config-btn" id="modelConfigBtn" title="Configure providers">
        <svg viewBox="0 0 1024 1024" aria-hidden="true">
          <path d="M512 192a64 64 0 0 1 63.1 53.5l8.1 48.5a225 225 0 0 1 42.9 24.8l45.8-17.3a64 64 0 0 1 75.3 26.4l42.7 73.9a64 64 0 0 1-12.3 78.8l-37.5 31.4a226.3 226.3 0 0 1 0 49.6l37.5 31.4a64 64 0 0 1 12.3 78.8l-42.7 73.9a64 64 0 0 1-75.3 26.4l-45.8-17.3a225 225 0 0 1-42.9 24.8l-8.1 48.5A64 64 0 0 1 512 832h-85.3a64 64 0 0 1-63.1-53.5l-8.1-48.5a225 225 0 0 1-42.9-24.8l-45.8 17.3a64 64 0 0 1-75.3-26.4l-42.7-73.9a64 64 0 0 1 12.3-78.8l37.5-31.4a226.3 226.3 0 0 1 0-49.6L161.1 431a64 64 0 0 1-12.3-78.8l42.7-73.9a64 64 0 0 1 75.3-26.4l45.8 17.3a225 225 0 0 1 42.9-24.8l8.1-48.5A64 64 0 0 1 426.7 192H512Zm-42.7 213.3a106.7 106.7 0 1 0 0 213.4 106.7 106.7 0 0 0 0-213.4Z"></path>
        </svg>
      </button>
      <div class="model-dropdown" id="modelDropdown"></div>
    </div>

    <!-- 聊天视图 -->
    <div class="chat-container" id="chatContainer">
      <div class="messages" id="messages"></div>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>Thinking...</span>
      </div>
      <div class="composer">
        <!-- Skills Popup -->
        <div class="skills-popup" id="skillsPopup">
          <div class="skills-popup-header">Select Skills</div>
          <div class="skills-popup-list" id="skillsPopupList"></div>
        </div>
        <div class="input-wrap">
          <div class="tools-line"></div>
          <textarea id="prompt" placeholder="Write a prompt..." rows="3"></textarea>
          <div class="composer-footer">
            <div class="skills-bar">
              <button class="skills-button" id="skillsButton" title="Select Skills">
                <svg viewBox="0 0 1102 1024" width="18" height="18" aria-hidden="true">
                  <path d="M1080.647345 359.858716l-149.888622 86.404529v341.128546c0 12.287244-6.616208 23.629315-17.564458 30.00923l-344.594179 201.243001a38.121962 38.121962 0 0 1-38.437019 0l-344.594179-201.243001a34.813858 34.813858 0 0 1-17.564458-29.930465V446.026952L17.879515 359.858716A34.971386 34.971386 0 0 1 0 329.691957c0-12.287244 6.773737-23.70808 17.879515-30.166759L530.320596 5.025168a38.594548 38.594548 0 0 1 37.885668 0l512.441081 294.578795c11.027014 6.301151 17.879515 17.800751 17.879515 30.087994a34.971386 34.971386 0 0 1-17.879515 30.166759zM549.224048 76.149406l-441.080549 253.621316 441.080549 253.463787 441.080549-253.542552-441.080549-253.542551z m307.811211 412.331549L568.206264 654.516276a38.358255 38.358255 0 0 1-37.885668 0L241.491601 488.402191v279.377269l307.732447 179.740323 307.811211-179.740323V488.402191z m208.883146-65.847025c20.321211 0 36.782967 15.752877 36.782967 35.20768v197.698603c0 19.533567-16.540521 35.286444-36.782967 35.286444a35.995323 35.995323 0 0 1-36.782967-35.20768V457.84161c0-19.454803 16.461756-35.20768 36.782967-35.20768z" />
                </svg>
                <span>Skill</span>
              </button>
              <div class="context-meter" id="contextMeter" aria-label="Context usage">
                <div class="context-meter-ring" id="contextMeterRing"></div>
                <div class="context-meter-tooltip" id="contextMeterTooltip" role="tooltip"></div>
              </div>
              <div class="skills-tags" id="skillsTags"></div>
            </div>
            <button class="send-button" id="send" title="Send">
              <svg class="send-icon" id="sendIcon" viewBox="0 0 32 32" aria-hidden="true">
                <path d="M27,5c-2.9-2.9-6.9-4.6-11-4.6S7.9,2.1,5,5c-2.9,2.9-4.6,6.9-4.6,11S2.1,24.1,5,27c2.9,2.9,6.9,4.6,11,4.6 s8.1-1.6,11-4.6c2.9-2.9,4.6-6.9,4.6-11S29.9,7.9,27,5z M23.2,11c-0.2,2.5-1.2,8.4-1.8,11.2c-0.2,1.2-0.6,1.6-1.1,1.6 c-0.9,0.1-1.6-0.6-2.5-1.2c-1.4-0.9-2.1-1.5-3.5-2.3c-1.5-1-0.5-1.6,0.3-2.5c0.2-0.2,4.2-3.9,4.3-4.2c0,0,0-0.2-0.1-0.3 c-0.1-0.1-0.2-0.1-0.3,0c-0.1,0-2.3,1.5-6.6,4.3c-0.6,0.4-1.2,0.6-1.7,0.6c-0.6,0-1.6-0.3-2.4-0.6c-1-0.3-1.7-0.5-1.7-1 c0-0.3,0.4-0.6,1.2-0.9c4.5-2,7.6-3.3,9.1-3.9c4.3-1.8,5.2-2.1,5.8-2.1c0.1,0,0.4,0,0.6,0.2c0.2,0.1,0.2,0.3,0.2,0.4 C23.2,10.5,23.2,10.8,23.2,11L23.2,11z" />
              </svg>
              <svg class="send-icon" id="stopIcon" viewBox="0 0 32 32" aria-hidden="true">
                <path d="M5,4.9c-6.1,6.1-6.1,16,0,22.1c6.1,6.1,16,6.1,22.1,0s6.1-16,0-22.1C21-1.1,11.1-1.2,5,4.9z M21,12.5l0,7 c0,0.8-0.7,1.5-1.5,1.5l-7,0c-0.8,0-1.5-0.7-1.5-1.5l0-7c0-0.8,0.7-1.5,1.5-1.5l7,0C20.3,11,21,11.7,21,12.5z" />
              </svg>
            </button>
        </div>
      </div>
    </div>
  </div>

<script nonce="{{nonce}}" src="{{attachmentsJsUri}}"></script>
<script nonce="{{nonce}}">
  const vscode = acquireVsCodeApi();
  const workspaceRoot = {{workspaceRoot}};
  const app = document.querySelector(".app");
  const messages = document.getElementById("messages");
  const inputWrap = document.querySelector(".input-wrap");
  const toolsLine = document.querySelector(".tools-line");
  const promptInput = document.getElementById("prompt");
  const promptMinRows = Number(promptInput?.getAttribute("rows")) || 3;
  const promptMaxRows = 10;
  const sendButton = document.getElementById("send");
  const loading = document.getElementById("loading");
  const sessionSelector = document.getElementById("sessionSelector");
  const sessionSelectorTitle = document.getElementById("sessionSelectorTitle");
  const sessionSelectorTitleText = document.getElementById("sessionSelectorTitleText");
  const sessionDropdown = document.getElementById("sessionDropdown");
  const newSessionBtn = document.getElementById("newSessionBtn");
  const modelToolbar = document.getElementById("modelToolbar");
  const modelSelector = document.getElementById("modelSelector");
  const modelSelectorLabel = document.getElementById("modelSelectorLabel");
  const modelSelectorSubtitle = document.getElementById("modelSelectorSubtitle");
  const modelProviderDot = document.getElementById("modelProviderDot");
  const modelDropdown = document.getElementById("modelDropdown");
  const modelConfigBtn = document.getElementById("modelConfigBtn");
  const sendIcon = document.getElementById("sendIcon");
  const stopIcon = document.getElementById("stopIcon");
  const skillsButton = document.getElementById("skillsButton");
  const skillsPopup = document.getElementById("skillsPopup");
  const skillsPopupList = document.getElementById("skillsPopupList");
  const skillsTags = document.getElementById("skillsTags");
  const contextMeter = document.getElementById("contextMeter");
  const contextMeterRing = document.getElementById("contextMeterRing");
  const contextMeterTooltip = document.getElementById("contextMeterTooltip");

  const attachmentManager = typeof window.createPromptAttachmentManager === "function"
    ? window.createPromptAttachmentManager({
      promptInput,
      inputWrap,
      toolsLine,
      onAttachmentChange: () => {
        updateSendIconState();
      }
    })
    : null;

  // Prompt history navigation (ArrowUp/ArrowDown)
  let inputHistory = []; // user prompts in the current session, oldest -> newest
  let historyCursor = -1; // -1 means not browsing history; otherwise 0..inputHistory.length-1
  let draftBeforeHistory = null; // preserved draft when entering history browsing
  let pendingUserPrompt = null; // last prompt sent, used to reduce double-recording
  let lastHistoryRecordText = "";
  let lastHistoryRecordAt = 0;

  function exitHistoryBrowsing() {
    if (historyCursor === -1) return;
    historyCursor = -1;
    draftBeforeHistory = null;
  }

  let currentSessionId = null;
  let currentSessionStatus = null;
  let allSessions = [];
  let sessionSearchInput = null;
  let sessionDropdownList = null;
  let modelState = null;
  let modelSearchQuery = "";
  let modelOnlyConfigured = true;
  let lastMessageRole = null;
  let currentThinkingBubble = null; // 记录当前展开的思考气泡
  let availableSkills = []; // 可用的技能列表
  let selectedSkills = []; // 已选择的技能
  let currentRunningProcesses = null; // 当前正在运行的进程: Record<string, { startTime: string; command: string }> | null
  let loadingUpdateTimer = null; // 定时更新loading文本的计时器
  let currentLlmStreamProgress = null;
  let currentTokenTelemetry = null;

  function isBusyStatus(status) {
    return status === "processing" || status === "pending";
  }

  function isProcessing() {
    return isBusyStatus(currentSessionStatus);
  }

  function getPromptLineHeight() {
    const styles = window.getComputedStyle(promptInput);
    const lineHeight = parseFloat(styles.lineHeight);
    if (Number.isFinite(lineHeight)) {
      return lineHeight;
    }

    const fontSize = parseFloat(styles.fontSize) || 13;
    return fontSize * 1.4;
  }

  function getPromptVerticalSize() {
    const styles = window.getComputedStyle(promptInput);
    const paddingTop = parseFloat(styles.paddingTop) || 0;
    const paddingBottom = parseFloat(styles.paddingBottom) || 0;
    const borderTop = parseFloat(styles.borderTopWidth) || 0;
    const borderBottom = parseFloat(styles.borderBottomWidth) || 0;
    return paddingTop + paddingBottom + borderTop + borderBottom;
  }

  function autoResizePrompt() {
    if (!promptInput) {
      return;
    }

    const lineHeight = getPromptLineHeight();
    const verticalSize = getPromptVerticalSize();
    const minHeight = Math.ceil(lineHeight * promptMinRows + verticalSize);
    const maxHeight = Math.ceil(lineHeight * promptMaxRows + verticalSize);

    promptInput.style.height = "auto";
    const nextHeight = Math.min(Math.max(promptInput.scrollHeight, minHeight), maxHeight);
    promptInput.style.height = `${nextHeight}px`;
    promptInput.style.overflowY = promptInput.scrollHeight > maxHeight ? "auto" : "hidden";
  }

  function getTokenUsagePercent(telemetry) {
    const activeTokens = Number(telemetry?.activeTokens || 0);
    const threshold = Number(telemetry?.compactPromptTokenThreshold || 0);
    if (!Number.isFinite(activeTokens) || !Number.isFinite(threshold) || threshold <= 0) {
      return 0;
    }
    return Math.trunc(0.5 * activeTokens / threshold * 100);
  }

  function formatTokenCount(value) {
    const number = Number(value || 0);
    if (!Number.isFinite(number)) {
      return "0";
    }
    return number.toLocaleString();
  }

  function flattenUsageFields(value, prefix = "") {
    if (!value || typeof value !== "object" || Array.isArray(value)) {
      return [];
    }

    const rows = [];
    Object.entries(value).forEach(([key, nestedValue]) => {
      const fieldName = prefix ? `${prefix}.${key}` : key;
      if (nestedValue && typeof nestedValue === "object" && !Array.isArray(nestedValue)) {
        rows.push(...flattenUsageFields(nestedValue, fieldName));
      } else {
        rows.push([fieldName, nestedValue]);
      }
    });
    return rows;
  }

  function formatUsageFieldLabel(label) {
    if (label === "prompt_tokens_details.cached_tokens") {
      return "prompt_cached_tokens";
    }
    if (label === "completion_tokens_details.reasoning_tokens") {
      return "completion_reasoning_tokens";
    }
    return label;
  }

  function addTooltipRow(container, label, value) {
    const row = document.createElement("div");
    row.className = "context-tooltip-row";

    const labelNode = document.createElement("span");
    labelNode.className = "context-tooltip-label";
    labelNode.textContent = label;

    const valueNode = document.createElement("span");
    valueNode.className = "context-tooltip-value";
    valueNode.textContent = String(value);

    row.appendChild(labelNode);
    row.appendChild(valueNode);
    container.appendChild(row);
  }

  function renderContextMeterTooltip(telemetry, percent) {
    if (!contextMeterTooltip) {
      return;
    }

    contextMeterTooltip.innerHTML = "";

    const title = document.createElement("div");
    title.className = "context-tooltip-title";
    title.textContent = "Context Window";
    contextMeterTooltip.appendChild(title);

    const summary = document.createElement("div");
    summary.className = "context-tooltip-summary";
    summary.textContent = `${percent}% used`;
    contextMeterTooltip.appendChild(summary);

    addTooltipRow(contextMeterTooltip, "model", telemetry?.model || "unknown");
    addTooltipRow(contextMeterTooltip, "thinking enabled", telemetry?.thinkingEnabled ? "true" : "false");
    addTooltipRow(contextMeterTooltip, "reasoning effort", telemetry?.reasoningEffort || "max");
    addTooltipRow(contextMeterTooltip, "activeTokens", formatTokenCount(telemetry?.activeTokens));

    const usageRows = flattenUsageFields(telemetry?.usage);
    if (usageRows.length > 0) {
      const section = document.createElement("div");
      section.className = "context-tooltip-section";
      section.textContent = "session.usage";
      contextMeterTooltip.appendChild(section);
      usageRows.forEach(([key, value]) => {
        addTooltipRow(
          contextMeterTooltip,
          formatUsageFieldLabel(key),
          typeof value === "number" ? formatTokenCount(value) : value
        );
      });
    }
  }

  function updateContextMeter(telemetry) {
    currentTokenTelemetry = telemetry || null;
    const percent = getTokenUsagePercent(currentTokenTelemetry);
    const cappedPercent = Math.max(0, Math.min(percent, 100));

    if (contextMeterRing) {
      contextMeterRing.style.setProperty("--context-percent", `${cappedPercent}%`);
    }
    if (contextMeter) {
      contextMeter.setAttribute("aria-label", `Context usage ${percent}%`);
    }
    renderContextMeterTooltip(currentTokenTelemetry, percent);
  }

  function updateContextMeterTooltipPosition() {
    if (!contextMeter || !contextMeterTooltip) {
      return;
    }

    const meterRect = contextMeter.getBoundingClientRect();
    const tooltipRect = contextMeterTooltip.getBoundingClientRect();
    const margin = 8;
    const centeredLeft = meterRect.left + meterRect.width / 2 - tooltipRect.width / 2;
    const left = Math.max(margin, Math.min(centeredLeft, window.innerWidth - tooltipRect.width - margin));
    const top = Math.max(margin, meterRect.top - tooltipRect.height - 10);

    contextMeterTooltip.style.left = `${left}px`;
    contextMeterTooltip.style.top = `${top}px`;
    contextMeterTooltip.style.bottom = "auto";
  }

  function getAttachedImageUrls() {
    return attachmentManager ? attachmentManager.getImageUrls() : [];
  }

  contextMeter?.addEventListener("mouseenter", () => {
    requestAnimationFrame(updateContextMeterTooltipPosition);
  });

  // Skills functions
  function showSkillsPopup() {
    if (skillsPopup) {
      skillsPopup.classList.add("show");
      // 渲染技能列表
      renderSkillsList();
    }
  }

  function hideSkillsPopup() {
    if (skillsPopup) {
      skillsPopup.classList.remove("show");
    }
  }

  function renderSkillsList() {
    if (!skillsPopupList) return;
    skillsPopupList.innerHTML = "";

    if (availableSkills.length === 0) {
      skillsPopupList.innerHTML = '<div class="skills-popup-empty">No skills found</div>';
      return;
    }

    availableSkills.forEach((skill) => {
      const item = document.createElement("div");
      item.className = "skills-popup-item";
      const isSelected = selectedSkills.some((s) => s.name === skill.name);
      if (isSelected) {
        item.classList.add("selected");
      }
      item.title = skill.path; // 鼠标悬停显示完整路径
      item.innerHTML = `
        <span class="skills-popup-item-name" title="${escapeHtml(skill.name)}">${escapeHtml(skill.name)}</span>
        <span class="skills-popup-item-path" title="${escapeHtml(skill.path)}">${escapeHtml(skill.path)}</span>
        ${skill.isLoaded ? '<span class="skills-popup-item-loaded">✓</span>' : ''}
      `;
      item.addEventListener("click", () => {
        toggleSkill(skill);
      });
      skillsPopupList.appendChild(item);
    });
  }

  function toggleSkill(skill) {
    const index = selectedSkills.findIndex((s) => s.name === skill.name);
    if (index >= 0) {
      selectedSkills.splice(index, 1);
    } else {
      selectedSkills.push(skill);
    }
    renderSkillsTags();
    renderSkillsList();
  }

  function removeSkill(skillName) {
    selectedSkills = selectedSkills.filter((s) => s.name !== skillName);
    renderSkillsTags();
    renderSkillsList();
  }

  function renderSkillsTags() {
    if (!skillsTags) return;
    // 使用 inner 容器包裹 tags，实现省略号效果
    let inner = skillsTags.querySelector(".skills-tags-inner");
    if (!inner) {
      inner = document.createElement("div");
      inner.className = "skills-tags-inner";
      skillsTags.appendChild(inner);
    }
    inner.innerHTML = "";

    selectedSkills.forEach((skill) => {
      const tag = document.createElement("div");
      tag.className = "skill-tag";
      tag.innerHTML = `
        <span class="skill-tag-name">${escapeHtml(skill.name)}</span>
        <span class="skill-tag-remove">&times;</span>
      `;
      tag.querySelector(".skill-tag-remove").addEventListener("click", (e) => {
        e.stopPropagation();
        removeSkill(skill.name);
      });
      inner.appendChild(tag);
    });
  }

  function updateSkillsButtonTooltip() {
    if (skillsButton) {
      if (availableSkills.length === 0) {
        skillsButton.title = "skills from ~/.agents/skills/ can be discovered and activated.";
      } else {
        skillsButton.title = "Select Skills";
      }
    }
  }

  // 点击技能按钮
  skillsButton?.addEventListener("click", (e) => {
    e.stopPropagation();
    if (skillsPopup && skillsPopup.classList.contains("show")) {
      hideSkillsPopup();
    } else {
      showSkillsPopup();
    }
  });

  // 点击其他地方关闭技能弹窗
  document.addEventListener("click", (event) => {
    if (skillsPopup && skillsButton && !skillsPopup.contains(event.target) && !skillsButton.contains(event.target)) {
      hideSkillsPopup();
    }
  });

  function setThinkingBubbleExpanded(bubble, expanded) {
    if (!bubble) return;
    const contentDiv = bubble.querySelector(".bubble-collapsible-content");
    const toggleBtn = bubble.querySelector(".bubble-toggle");
    
    if (expanded) {
      contentDiv.classList.remove("collapsed");
      toggleBtn.classList.add("expanded");
    } else {
      contentDiv.classList.add("collapsed");
      toggleBtn.classList.remove("expanded");
    }
  }

  function setAskUserQuestionFormState(form, interactive) {
    if (!form) return;
    form.dataset.interactive = interactive ? "true" : "false";
    const controls = form.querySelectorAll("input, textarea, button");
    controls.forEach((control) => {
      control.disabled = !interactive;
    });

    const submitButton = form.querySelector(".ask-user-question-submit");
    if (submitButton) {
      submitButton.hidden = !interactive;
    }
  }

  function updateAskUserQuestionInteractivity() {
    const interactive = currentSessionStatus === "waiting_for_user";
    const forms = messages.querySelectorAll(".ask-user-question-form");
    forms.forEach((form) => {
      setAskUserQuestionFormState(form, interactive);
    });
  }

  function buildAskUserQuestionReply(questions, form) {
    const lines = ["Answer to AskUserQuestion:"];

    for (let index = 0; index < questions.length; index += 1) {
      const question = questions[index];
      const selectedOptions = Array.from(
        form.querySelectorAll(`input[name="askq-${index}-option"]:checked`)
      ).map((input) => input.value).filter(Boolean);
      const otherInput = form.querySelector(`textarea[name="askq-${index}-other"]`);
      const otherText = otherInput ? otherInput.value.trim() : "";

      if (selectedOptions.length === 0 && !otherText) {
        return {
          ok: false,
          error: `Please answer question ${index + 1}.`
        };
      }

      lines.push("");
      lines.push(`${index + 1}. ${question.question}`);
      if (selectedOptions.length > 0) {
        lines.push(`- Selected: ${selectedOptions.join(", ")}`);
      }
      if (otherText) {
        lines.push(`- Other: ${otherText}`);
      }
    }

    return {
      ok: true,
      text: lines.join("\n")
    };
  }

  function renderAskUserQuestionContent(toolData, contentDiv) {
    const metadata = toolData && toolData.metadata && typeof toolData.metadata === "object"
      ? toolData.metadata
      : null;
    const questions = Array.isArray(metadata?.questions) ? metadata.questions : [];
    const wrapper = document.createElement("div");

    const form = document.createElement("form");

      options.forEach((option, optionIndex) => {

        const input = document.createElement("input");

        row.appendChild(input);

      });

      const otherWrap = document.createElement("label");
      otherWrap.className = "ask-user-question-other";

      otherLabel.textContent = "Other";

      const otherInput = document.createElement("textarea");

      otherInput.rows = 2;
      otherInput.placeholder = "Type your answer if none of the options fit";

    });

    const actions = document.createElement("div");
    actions.className = "ask-user-question-actions";

    const errorMessage = document.createElement("div");

    submitButton.textContent = "Submit answer";
    actions.appendChild(submitButton);

    form.appendChild(actions);

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const reply = buildAskUserQuestionReply(questions, form);
      if (!reply.ok) {
        errorMessage.textContent = reply.error || "Please answer the question.";
        return;
      }
      errorMessage.textContent = "";
      setAskUserQuestionFormState(form, false);
      sendUserPromptText(reply.text);
    });

    wrapper.appendChild(form);
    contentDiv.appendChild(wrapper);
    setAskUserQuestionFormState(form, currentSessionStatus === "waiting_for_user");
    return false;
  }

  function addBubble(content, role, meta, shouldConnectToPrev = false) {

    if (role === "assistant" && meta && meta.asThinking === true) {

    if (role === "user") {
      // 普通用户气泡
      bubble.textContent = content;
    } else if (role === "assistant") {
      if (meta && meta.asThinking === true) {
        // 思考气泡（可折叠）

        const contentDiv = document.createElement("div");

      header.innerHTML = `
        <span class="${dotClass}" style="background-color: var(--vscode-button-background);"></span>
        <span class="bubble-title">
          <span class="bubble-title-text"><b>Skills</b> <span class="tool-params">${escapeHtml(skillName)}</span></span>
          <span class="bubble-toggle">
            <svg viewBox="0 0 1024 1024" aria-hidden="true">
              <path d="M884 256h-75c-5.1 0-9.9 2.5-12.9 6.6L512 654.2 227.9 262.6c-3-4.1-7.8-6.6-12.9-6.6h-75c-6.5 0-10.3 7.4-6.5 12.7l352.6 486.1c12.8 17.6 39 17.6 51.7 0l352.6-486.1c3.9-5.3.1-12.7-6.4-12.7z"></path>
            </svg>
          </span>
        </span>
      `;

      const contentDiv = document.createElement("div");
      contentDiv.className = "bubble-collapsible-content collapsed";
      contentDiv.textContent = skillDescription;

      header.addEventListener("click", () => {
        const isCollapsed = contentDiv.classList.toggle("collapsed");
        const toggleBtn = header.querySelector(".bubble-toggle");
        if (isCollapsed) {
          toggleBtn.classList.remove("expanded");
        } else {
          toggleBtn.classList.add("expanded");
        }
        requestAnimationFrame(() => {
          updateAllConnectionLines();
        });
      });

      bubble.appendChild(header);
      bubble.appendChild(contentDiv);
    } else if (role === "tool") {
      // 工具气泡（可折叠）
      // DualTrit 压缩字段映射
      const DT_EXPAND = {
        k: "ok", n: "name", o: "output", e: "error", t: "tcState",
        c: "tcChain", m: "metadata", a: "awaitUserResponse", d: "description",
        s: "source", C: "content", r: "result", D: "duration_ms", x: "exit_code",
        T: "total", P: "passed", F: "failed", S: "summary", u: "truncated",
        f: "failures", E: "errors", W: "warnings", L: "line", M: "message",
      };
      function dtDecompress(obj) {
        if (!obj || typeof obj !== "object" || Array.isArray(obj)) return obj;
        const result = {};
        for (const [key, value] of Object.entries(obj)) {
          const ek = DT_EXPAND[key] || key;
          result[ek] = (value && typeof value === "object" && !Array.isArray(value))
            ? dtDecompress(value)
            : Array.isArray(value) ? value.map(v => dtDecompress(v)) : value;
        }
        return result;
      }
      let toolData = { ok: false, name: "unknown", output: "" };
      try {
        const parsed = JSON.parse(content || "{}");
        // 如果检测到压缩字段(k,n,o)，做完整解压；否则直接使用
        toolData = (parsed.k !== undefined || parsed.n !== undefined)
          ? dtDecompress(parsed)
          : parsed;
      } catch (e) {
        // 忽略解析错误
      }

      const isOk = toolData.ok === true;
      const toolName = toolData.name || "unknown";
      const paramsMd = (meta?.paramsMd || "").trim();
      const resultMd = (meta?.resultMd || "").trim();

      const header = document.createElement("div");
      header.className = "bubble-collapsible-header";

      const titleText = paramsMd
        ? `<b>${escapeHtml(toolName)}</b> <span class="tool-params">${escapeHtml(paramsMd)}</span>`
        : `<b>${escapeHtml(toolName)}</b>`;

      const dotClasses = ["bubble-dot"];
      if (isOk) dotClasses.push("success");
      else dotClasses.push("error");
      if (shouldConnectToPrev) dotClasses.push("connect-to-prev");

      header.innerHTML = `
        <span class="${dotClasses.join(' ')}"></span>
        <span class="bubble-title">
          <span class="bubble-title-text">${titleText}</span>
          <span class="bubble-toggle">
            <svg viewBox="0 0 1024 1024" aria-hidden="true">
              <path d="M884 256h-75c-5.1 0-9.9 2.5-12.9 6.6L512 654.2 227.9 262.6c-3-4.1-7.8-6.6-12.9-6.6h-75c-6.5 0-10.3 7.4-6.5 12.7l352.6 486.1c12.8 17.6 39 17.6 51.7 0l352.6-486.1c3.9-5.3.1-12.7-6.4-12.7z"></path>
            </svg>
          </span>
        </span>
      `;

      const contentDiv = document.createElement("div");
      const isAskUserQuestion = toolData.metadata && toolData.metadata.kind === "ask_user_question";
      contentDiv.className = isAskUserQuestion
        ? "bubble-collapsible-content ask-user-question-content"
        : "bubble-collapsible-content collapsed";
      if (isAskUserQuestion) {
        header.querySelector(".bubble-toggle")?.classList.add("expanded");
      }

      if (isAskUserQuestion) {
        renderAskUserQuestionContent(toolData, contentDiv);
      } else {
        const rendered = renderStructuredToolResult(toolData, contentDiv);
        if (!rendered) {
          // 优先显示resultMd，其次是output，最后是完整content
          let displayContent = resultMd;
          if (!displayContent && toolData.output) {
            displayContent = typeof toolData.output === 'string'
              ? toolData.output
              : JSON.stringify(toolData.output, null, 2);
          }
          if (!displayContent) {
            displayContent = content;
          }

          contentDiv.textContent = displayContent;
        }
      }

      header.addEventListener("click", () => {
        const isCollapsed = contentDiv.classList.toggle("collapsed");
        const toggleBtn = header.querySelector(".bubble-toggle");
        if (isCollapsed) {
          toggleBtn.classList.remove("expanded");
        } else {
          toggleBtn.classList.add("expanded");
        }
        // 折叠/展开后重新计算所有连接线
        requestAnimationFrame(() => {
          updateAllConnectionLines();
        });
      });

      bubble.appendChild(header);
      bubble.appendChild(contentDiv);

      const toolParams = header.querySelector(".tool-params");
      if (toolParams && paramsMd) {
        toolParams.dataset.tip = paramsMd;
        addToolParamsTooltip(toolParams);
      }
    }

    messages.appendChild(bubble);
    messages.scrollTop = messages.scrollHeight;
    lastMessageRole = role;

    // 如果需要连接线，动态计算并设置连接线高度
    if (shouldConnectToPrev && role !== "user") {
      requestAnimationFrame(() => {
        updateConnectionLine(bubble);
      });
    }

    requestAnimationFrame(() => {
      updateAllConnectionLines();
    });
  }

  function updateConnectionLine(currentBubble) {
    // 找到当前气泡的圆点
    const currentDot = currentBubble.querySelector('.bubble-dot.connect-to-prev');
    if (!currentDot) return;

    // 找到上一个气泡
    const prevBubble = currentBubble.previousElementSibling;
    if (!prevBubble) return;

    // 找到上一个气泡的圆点
    const prevDot = prevBubble.querySelector('.bubble-dot');
    if (!prevDot) return;

    // 计算两个圆点之间的距离
    const currentRect = currentDot.getBoundingClientRect();
    const prevRect = prevDot.getBoundingClientRect();
    const distance = currentRect.top - prevRect.bottom;

    // 设置连接线高度（加上圆点的半径补偿）
    if (distance > 0) {
      currentDot.style.setProperty('--line-height', `${distance}px`);
    }
  }

  function updateAllConnectionLines() {
    const bubbles = messages.querySelectorAll('.bubble');
    bubbles.forEach(bubble => {
      updateConnectionLine(bubble);
    });
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function renderStructuredToolResult(toolData, container) {
    if (!toolData || toolData.ok !== true) {
      return false;
    }

    const toolName = String(toolData.name || "").toLowerCase();
    if (toolName !== "edit" && toolName !== "write") {
      return false;
    }

    const metadata = toolData.metadata && typeof toolData.metadata === "object"
      ? toolData.metadata
      : null;
    if (!metadata || typeof metadata.file_path !== "string") {
      return false;
    }

    const details = document.createElement("div");
    details.className = "tool-result-details";

    if (typeof toolData.output === "string" && toolData.output.trim()) {
      const summary = document.createElement("div");
      summary.className = "tool-result-summary";
      summary.textContent = toolData.output.trim();
      details.appendChild(summary);
    }

    const fileRow = document.createElement("div");
    fileRow.className = "tool-result-file-row";

    const fileLabel = document.createElement("span");
    fileLabel.className = "tool-result-label";
    fileLabel.textContent = "File";
    fileRow.appendChild(fileLabel);

    const fileButton = document.createElement("button");
    fileButton.type = "button";
    fileButton.className = "tool-result-filepath";
    fileButton.textContent = formatDisplayPath(metadata.file_path);
    fileButton.title = metadata.file_path;
    fileButton.addEventListener("click", (event) => {
      event.stopPropagation();
      const targetLine = metadata.scope && typeof metadata.scope.start_line === "number"
        ? metadata.scope.start_line
        : 1;
      vscode.postMessage({
        type: "openFile",
        filePath: metadata.file_path,
        line: targetLine
      });
    });
    fileRow.appendChild(fileButton);
    details.appendChild(fileRow);

    if (typeof metadata.diff_preview === "string" && metadata.diff_preview.trim()) {
      const diffBlock = renderDiffPreview(metadata.diff_preview);
      if (diffBlock) {
        details.appendChild(diffBlock);
      }
    }

    container.appendChild(details);
    return true;
  }

  function formatDisplayPath(filePath) {
    if (!filePath) {
      return "";
    }

    if (workspaceRoot && isPathInsideWorkspace(filePath, workspaceRoot)) {
      const relative = getRelativePath(filePath, workspaceRoot);
      if (relative) {
        return relative;
      }
    }

    return filePath;
  }

  function isPathInsideWorkspace(filePath, rootPath) {
    const normalizedFile = normalizePath(filePath);
    const normalizedRoot = normalizePath(rootPath);
    return normalizedFile === normalizedRoot || normalizedFile.startsWith(`${normalizedRoot}/`);
  }

  function getRelativePath(filePath, rootPath) {
    const normalizedFile = normalizePath(filePath);
    const normalizedRoot = normalizePath(rootPath);
    if (!normalizedFile.startsWith(normalizedRoot)) {
      return filePath;
    }
    return normalizedFile.slice(normalizedRoot.length).replace(/^\/+/, "");
  }

  function normalizePath(value) {
    return String(value || "").replace(/\\/g, "/").replace(/\/+$/, "");
  }

  function renderDiffPreview(diffPreview) {
    const lines = String(diffPreview || "").split("\n");
    const meaningfulLines = lines.filter((line) => {
      return !line.startsWith("--- ") &&
        !line.startsWith("+++ ") &&
        !line.startsWith("@@ ");
    });

    if (meaningfulLines.length === 0) {
      return null;
    }

    const section = document.createElement("div");
    section.className = "tool-result-diff";

    const label = document.createElement("div");
    label.className = "tool-result-label";
    label.textContent = "Changes";
    section.appendChild(label);

    const list = document.createElement("div");
    list.className = "diff-preview";

    meaningfulLines.forEach((line) => {
      if (!line) {
        return;
      }

      const row = document.createElement("div");
      row.className = "diff-line";

      const marker = document.createElement("span");
      marker.className = "diff-line-marker";
      marker.textContent = line[0] === "+" || line[0] === "-" ? line[0] : " ";

      const content = document.createElement("span");
      content.className = "diff-line-content";
      content.textContent = line.slice(1);

      if (line.startsWith("+")) {
        row.classList.add("added");
      } else if (line.startsWith("-")) {
        row.classList.add("removed");
      } else {
        row.classList.add("context");
      }

      row.appendChild(marker);
      row.appendChild(content);
      list.appendChild(row);
    });

    section.appendChild(list);
    return section;
  }

  function addToolParamsTooltip(element) {
    const tooltipText = element.dataset.tip;
    if (!tooltipText) return;

    let tooltip = null;
    let showTimer = null;

    function updateTooltipPosition() {
      if (!tooltip) return;
      const rect = element.getBoundingClientRect();
      tooltip.style.left = rect.left + 'px';
      tooltip.style.top = (rect.bottom + 10) + 'px';
    }

    element.addEventListener('mouseenter', () => {
      // 清除旧的延迟任务
      if (showTimer) {
        clearTimeout(showTimer);
      }

      // 延迟 500ms 后显示 tooltip
      showTimer = setTimeout(() => {
        if (tooltip) {
          tooltip.remove();
        }
        tooltip = document.createElement('div');
        tooltip.className = 'tooltip show';
        tooltip.textContent = tooltipText;
        document.body.appendChild(tooltip);
        
        // 下一帧时更新位置，确保元素已渲染
        requestAnimationFrame(() => {
          updateTooltipPosition();
        });

        // 监听窗口大小变化和滚动
        const handleUpdate = () => updateTooltipPosition();
        window.addEventListener('resize', handleUpdate);
        window.addEventListener('scroll', handleUpdate, true);

        const handleMouseLeave = () => {
          if (tooltip) {
            tooltip.remove();
            tooltip = null;
          }
          window.removeEventListener('resize', handleUpdate);
          window.removeEventListener('scroll', handleUpdate, true);
          element.removeEventListener('mouseleave', handleMouseLeave);
        };

        element.addEventListener('mouseleave', handleMouseLeave);
      }, 500);
    });

    element.addEventListener('mouseleave', () => {
      // 鼠标离开时清除延迟任务和 tooltip
      if (showTimer) {
        clearTimeout(showTimer);
        showTimer = null;
      }
      if (tooltip) {
        tooltip.remove();
        tooltip = null;
      }
    });
  }

  function formatElapsedTime(startTimeIso) {
    const startTime = new Date(startTimeIso).getTime();
    const elapsedMs = Date.now() - startTime;
    const elapsedSeconds = Math.floor(elapsedMs / 1000);
    const minutes = Math.floor(elapsedSeconds / 60);
    const seconds = elapsedSeconds % 60;
    if (minutes > 0) {
      return `${minutes}m${seconds}s`;
    }
    return `${seconds}s`;
  }

  function updateLoadingText() {
    const loadingSpan = loading.querySelector('span');
    if (!loadingSpan) {
      return;
    }
    if (currentRunningProcesses && Object.keys(currentRunningProcesses).length > 0) {
      // 显示第一个运行中的进程（通常只有一个进程在运行）
      const firstPid = Object.keys(currentRunningProcesses)[0];
      const process = currentRunningProcesses[firstPid];
      const elapsed = formatElapsedTime(process.startTime);
      loadingSpan.textContent = `(${elapsed}) ${process.command}`;
      return;
    }

    if (currentLlmStreamProgress && currentLlmStreamProgress.startedAt) {
      const startedAt = new Date(currentLlmStreamProgress.startedAt).getTime();
      const elapsedSeconds = Math.max(0, Math.floor((Date.now() - startedAt) / 1000));
      if (elapsedSeconds >= 3) {
        const formattedTokens = currentLlmStreamProgress.formattedTokens || "0";
        loadingSpan.textContent = `Thinking... (${elapsedSeconds}s) · ↓ ${formattedTokens} tokens`;
        return;
      }
    }

    loadingSpan.textContent = 'Thinking...';
  }

  function setLoading(isLoading, status) {
    loading.classList.toggle("active", isLoading);
    if (status !== undefined) {
      currentSessionStatus = status;
    }
    if (!isLoading) {
      currentLlmStreamProgress = null;
    }

    // 清除旧的计时器
    if (loadingUpdateTimer !== null) {
      clearInterval(loadingUpdateTimer);
      loadingUpdateTimer = null;
    }

    if (isLoading) {
      loadingUpdateTimer = setInterval(updateLoadingText, 1000);
    }

    // 更新初始文本
    updateLoadingText();

    // 切换图标
    if (isLoading) {
      sendIcon.style.display = "none";
      stopIcon.style.display = "block";
      sendButton.title = "Stop";
    } else {
      sendIcon.style.display = "block";
      stopIcon.style.display = "none";
      sendButton.title = "Send";
    }

    updateSendIconState();
    updateAskUserQuestionInteractivity();
  }

  function updateSendIconState() {
    const hasContent = promptInput.value.trim().length > 0 || getAttachedImageUrls().length > 0;
    if (!isProcessing()) {
      sendIcon.classList.toggle("empty", !hasContent);
      sendButton.disabled = false;
    } else {
      sendButton.disabled = false; // 允许点击中断
    }
  }

  function closeModelDropdown() {
    modelDropdown?.classList.remove("show");
    modelSelector?.classList.remove("open");
  }

  function getModelKeyStatusLabel(model) {
    if (!model) {
      return "Not configured";
    }
    if (model.configured) {
      return model.apiKeySource === "process.env.provider" ? "Env key" : "Saved key";
    }
    return `Missing ${model.apiKeyEnv || "key"}`;
  }

  function renderModelDropdown() {
    if (!modelDropdown || !modelState) {
      return;
    }

    modelDropdown.innerHTML = "";
    const query = modelSearchQuery.trim().toLowerCase();

    const controls = document.createElement("div");
    controls.className = "model-dropdown-controls";

    const search = document.createElement("input");
    search.type = "text";
    search.className = "model-search-input";
    search.placeholder = "Search models...";
    search.value = modelSearchQuery;
    search.addEventListener("input", (event) => {
      modelSearchQuery = event.target.value || "";
      renderModelDropdown();
      const nextSearch = modelDropdown.querySelector(".model-search-input");
      if (nextSearch) {
        nextSearch.focus();
        nextSearch.setSelectionRange(nextSearch.value.length, nextSearch.value.length);
      }
    });

    const filterLabel = document.createElement("label");
    filterLabel.className = "model-filter-toggle";
    const filter = document.createElement("input");
    filter.type = "checkbox";
    filter.checked = modelOnlyConfigured;
    filter.addEventListener("change", () => {
      modelOnlyConfigured = filter.checked;
      renderModelDropdown();
    });
    const filterText = document.createElement("span");
    filterText.textContent = "Only configured";
    filterLabel.appendChild(filter);
    filterLabel.appendChild(filterText);

    controls.appendChild(search);
    controls.appendChild(filterLabel);
    modelDropdown.appendChild(controls);

    let renderedModelCount = 0;
    (modelState.providers || []).forEach((provider) => {
      const providerModels = (provider.models || []).filter((model) => {
        if (modelOnlyConfigured && !model.configured) {
          return false;
        }
        if (!query) {
          return true;
        }
        const haystack = [
          provider.name,
          provider.id,
          model.label,
          model.id,
          model.providerName,
          model.apiKeyEnv,
          ...(model.capabilities || []),
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();
        return haystack.includes(query);
      });

      if (providerModels.length === 0) {
        return;
      }

      const group = document.createElement("div");
      group.className = "model-dropdown-group";

      const header = document.createElement("div");
      header.className = "model-dropdown-provider";

      const title = document.createElement("span");
      title.textContent = provider.name;
      const status = document.createElement("span");
      status.className = provider.configured ? "model-provider-status configured" : "model-provider-status missing";
      status.textContent = provider.configured ? "Configured" : "No key";
      header.appendChild(title);
      header.appendChild(status);
      group.appendChild(header);

      providerModels.forEach((model) => {
        renderedModelCount += 1;
        const item = document.createElement("button");
        item.className = "model-dropdown-item";
        item.type = "button";
        item.classList.toggle("active", model.id === modelState.currentModel);
        item.classList.toggle("missing", !model.configured);

        const main = document.createElement("span");
        main.className = "model-dropdown-main";

        const label = document.createElement("span");
        label.className = "model-dropdown-label";
        label.textContent = model.label;

        const detail = document.createElement("span");
        detail.className = "model-dropdown-detail";
        const context = model.contextWindow ? `${Math.round(model.contextWindow / 1000)}K ctx` : "ctx";
        detail.textContent = `${context} · $${model.costPer1MInput}/${model.costPer1MOutput}/M · ${getModelKeyStatusLabel(model)}`;

        main.appendChild(label);
        main.appendChild(detail);

        const check = document.createElement("span");
        check.className = "model-dropdown-check";
        check.textContent = model.id === modelState.currentModel ? "✓" : "";

        item.appendChild(main);
        item.appendChild(check);
        item.addEventListener("click", () => {
          closeModelDropdown();
          vscode.postMessage({ type: "selectModel", modelId: model.id });
        });
        group.appendChild(item);
      });

      modelDropdown.appendChild(group);
    });

    if (renderedModelCount === 0) {
      const empty = document.createElement("div");
      empty.className = "model-dropdown-empty";
      empty.textContent = modelOnlyConfigured
        ? "No configured models match. Turn off Only configured to browse all models."
        : "No models match your search.";
      modelDropdown.appendChild(empty);
    }

    const footer = document.createElement("button");
    footer.className = "model-dropdown-footer";
    footer.type = "button";
    footer.textContent = "Configure providers...";
    footer.addEventListener("click", () => {
      closeModelDropdown();
      vscode.postMessage({ type: "openProviderSettings" });
    });
    modelDropdown.appendChild(footer);
  }

  function formatSessionDate(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    const sessionDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());

    // 计算天数差异
    const diffTime = today.getTime() - sessionDate.getTime();
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    if (diffDays === 0) {
      return "Today";
    } else if (diffDays === 1) {
      return "Yesterday";
    } else if (diffDays >= 2 && diffDays <= 7) {
      // 显示具体的星期几
      const weekdays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      return weekdays[sessionDate.getDay()];
    } else {
      return null; // 超过7天，不显示
    }
  }

  function renderFilteredSessions(searchQuery) {
    if (!sessionDropdownList) return;

    sessionDropdownList.innerHTML = "";
    const query = searchQuery.toLowerCase().trim();

    // 过滤会话
    const filteredSessions = allSessions.filter((session) => {
      const summary = (session.summary || "Untitled").toLowerCase();
      return summary.includes(query);
    });

    // 获取今天的开始时间
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    const lastWeek = new Date(today);
    lastWeek.setDate(lastWeek.getDate() - 7);

    // 按时间分组
    const groups = {
      today: [],
      yesterday: [],
      pastWeek: []
    };

    // 筛选并分组会话
    filteredSessions.forEach((session) => {
      const sessionDate = new Date(session.updateTime);
      const sessionDay = new Date(sessionDate.getFullYear(), sessionDate.getMonth(), sessionDate.getDate());

      if (sessionDay.getTime() === today.getTime()) {
        groups.today.push(session);
      } else if (sessionDay.getTime() === yesterday.getTime()) {
        groups.yesterday.push(session);
      } else if (sessionDay.getTime() > lastWeek.getTime() && sessionDay.getTime() < yesterday.getTime()) {
        groups.pastWeek.push(session);
      }
      // 超过7天的数据不显示
    });

    // 如果没有会话
    const totalCount = groups.today.length + groups.yesterday.length + groups.pastWeek.length;
    if (totalCount === 0) {
      const emptyDiv = document.createElement("div");
      emptyDiv.className = "session-dropdown-empty";
      emptyDiv.textContent = query ? "No sessions found" : "No sessions yet";
      sessionDropdownList.appendChild(emptyDiv);
      return;
    }

    // 创建分组渲染函数
    const renderGroup = (title, sessions) => {
      if (sessions.length === 0) return null;

      const groupDiv = document.createElement("div");
      groupDiv.className = "session-dropdown-group";

      const titleDiv = document.createElement("div");
      titleDiv.className = "session-dropdown-group-title";
      titleDiv.textContent = title;
      groupDiv.appendChild(titleDiv);

      sessions.forEach((session) => {
        const item = document.createElement("div");
        item.className = "session-dropdown-item";
        if (session.id === currentSessionId) {
          item.classList.add("active");
        }

        // 高亮搜索关键字
        const summary = session.summary || "Untitled";
        const highlightedSummary = query
          ? summary.replace(new RegExp(`(${escapeRegExp(query)})`, 'gi'), '<mark>$1</mark>')
          : summary;

        item.innerHTML = `
          <div class="session-dropdown-summary">${highlightedSummary}</div>
          <div class="session-dropdown-time">${formatSessionTime(session.updateTime)}</div>
        `;
        item.addEventListener("click", () => {
          sessionDropdown.classList.remove("show");
          sessionSelector.classList.remove("open");
          vscode.postMessage({ type: "selectSession", sessionId: session.id });
        });
        groupDiv.appendChild(item);
      });

      return groupDiv;
    };

    // 按顺序渲染分组
    const todayGroup = renderGroup("Today", groups.today);
    const yesterdayGroup = renderGroup("Yesterday", groups.yesterday);
    const pastWeekGroup = renderGroup("Past Week", groups.pastWeek);

    if (todayGroup) sessionDropdownList.appendChild(todayGroup);
    if (yesterdayGroup) sessionDropdownList.appendChild(yesterdayGroup);
    if (pastWeekGroup) sessionDropdownList.appendChild(pastWeekGroup);
  }

  function formatSessionTime(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const sessionDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());

    // 计算天数差异
    const diffTime = today.getTime() - sessionDate.getTime();
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

    if (diffDays === 0) {
      // 今天，显示时间
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } else {
      // 其他天，显示月/日
      const month = date.getMonth() + 1;
      const day = date.getDate();
      return `${month}/${day}`;
    }
  }

  function escapeRegExp(string) {
    return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function toggleSessionDropdown() {
    const isOpen = sessionDropdown.classList.toggle("show");
    sessionSelector.classList.toggle("open", isOpen);

    // 打开时清空搜索框并聚焦
    if (isOpen && sessionSearchInput) {
      sessionSearchInput.value = "";
      renderFilteredSessions("");
      // 延迟聚焦，确保下拉框已完全显示
      setTimeout(() => {
        sessionSearchInput.focus();
      }, 100);
    }
  }

  // 点击其他地方关闭下拉框
  document.addEventListener("click", (event) => {
    if (!sessionSelector.contains(event.target) && !sessionDropdown.contains(event.target)) {
      sessionDropdown.classList.remove("show");
      sessionSelector.classList.remove("open");
    }
    if (
      modelToolbar &&
      !modelToolbar.contains(event.target) &&
      modelDropdown &&
      !modelDropdown.contains(event.target)
    ) {
      closeModelDropdown();
    }
  });

  // 按 Escape 关闭下拉框
  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape" && sessionDropdown.classList.contains("show")) {
      sessionDropdown.classList.remove("show");
      sessionSelector.classList.remove("open");
    }
    if (event.key === "Escape" && modelDropdown?.classList.contains("show")) {
      closeModelDropdown();
    }
  });

  // 从状态恢复输入内容
  const savedState = vscode.getState();
  if (savedState && savedState.promptText) {
    promptInput.value = savedState.promptText || "";
    autoResizePrompt();
    updateSendIconState();
  }

  // 监听 visibilitychange 保存状态
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
      vscode.setState({
        promptText: promptInput.value
      });
    }
  });

  promptInput.addEventListener("input", () => {
    exitHistoryBrowsing(); // any text modification exits history browsing mode
    autoResizePrompt();
    updateSendIconState();
    // 保存输入内容
    vscode.setState({
      promptText: promptInput.value
    });
  });

  updateSendIconState();
  autoResizePrompt();

  function sendUserPromptText(text, skills, imageUrls) {
    const trimmed = (text || "").trim();
    const normalizedImages = Array.isArray(imageUrls) ? imageUrls.filter(Boolean) : [];
    if ((!trimmed && normalizedImages.length === 0) || sendButton.disabled) {
      return;
    }

    historyCursor = -1;
    draftBeforeHistory = null;
    pendingUserPrompt = trimmed || (normalizedImages.length > 0 ? "粘贴的图像" : "");

    vscode.postMessage({
      type: "userPrompt",
      prompt: trimmed,
      skills: skills && skills.length > 0 ? skills : undefined,
      images: normalizedImages.length > 0 ? normalizedImages : undefined
    });
  }

  function sendPrompt() {
    // 如果正在处理，则中断（不检查输入框内容）
    if (isProcessing()) {
      vscode.postMessage({ type: "interrupt" });
      // 立即更新本地状态为 interrupted
      currentSessionStatus = "interrupted";
      setLoading(false, currentSessionStatus);
      return;
    }

    // 检查输入内容
    const text = promptInput.value.trim();
    const imageUrls = getAttachedImageUrls();
    if ((!text && imageUrls.length === 0) || sendButton.disabled) {
      return;
    }

    // 发送消息，不立即显示（等待后端返回渲染后的 HTML）
    promptInput.value = "";
    vscode.setState({ promptText: "" });
    autoResizePrompt();
    sendUserPromptText(text, selectedSkills, imageUrls);
    // 清空已选择的技能
    selectedSkills = [];
    attachmentManager?.clear();
    renderSkillsTags();
    updateSendIconState();
  }

  sessionSelector.addEventListener("click", (event) => {
    event.stopPropagation();
    toggleSessionDropdown();
  });

  modelSelector?.addEventListener("click", (event) => {
    event.stopPropagation();
    const isOpen = modelDropdown?.classList.toggle("show");
    modelSelector.classList.toggle("open", Boolean(isOpen));
    sessionDropdown.classList.remove("show");
    sessionSelector.classList.remove("open");
    if (isOpen) {
      setTimeout(() => {
        const search = modelDropdown?.querySelector(".model-search-input");
        search?.focus();
      }, 0);
    }
  });

  modelConfigBtn?.addEventListener("click", (event) => {
    event.stopPropagation();
    closeModelDropdown();
    vscode.postMessage({ type: "openProviderSettings" });
  });

  newSessionBtn.addEventListener("click", () => {
    sessionDropdown.classList.remove("show");
    sessionSelector.classList.remove("open");
    vscode.postMessage({ type: "createNewSession" });
    promptInput.value = "";
    inputHistory = [];
    historyCursor = -1;
    draftBeforeHistory = null;
    pendingUserPrompt = null;
    attachmentManager?.clear();
    autoResizePrompt();
    updateSendIconState();
  });

  sendButton.addEventListener("click", sendPrompt);
  promptInput.addEventListener("keydown", (event) => {
    // History navigation: only intercept ArrowUp/Down at the very start/end of the textarea.
    // Otherwise keep native cursor movement (line up/down).
    const noModifier = !event.shiftKey && !event.altKey && !event.ctrlKey && !event.metaKey;

    function isCaretCollapsedAtStart(el) {
      return el.selectionStart === 0 && el.selectionEnd === 0;
    }

    function isCaretCollapsedAtEnd(el) {
      const len = el.value.length;
      return el.selectionStart === len && el.selectionEnd === len;
    }

    function applyPromptValue(value, caret = "end") {
      promptInput.value = value;
      autoResizePrompt();
      vscode.setState({ promptText: promptInput.value });
      updateSendIconState();
      promptInput.focus();
      const len = promptInput.value.length;
      if (caret === "start") {
        promptInput.setSelectionRange(0, 0);
      } else {
        promptInput.setSelectionRange(len, len);
      }
    }

    // Exit history browsing mode on any non-ArrowUp/ArrowDown key
    if (historyCursor !== -1 && event.key !== "ArrowUp" && event.key !== "ArrowDown") {
      exitHistoryBrowsing();
      // fall through — let the key event continue normally (typing, Enter, Backspace, etc.)
    }

    function navigateHistory(direction) {
      if (!inputHistory || inputHistory.length === 0) {
        return;
      }

      // Enter history browsing mode
      if (historyCursor === -1) {
        draftBeforeHistory = promptInput.value;
        historyCursor = inputHistory.length; // virtual position after the last item
      }

      historyCursor += direction;

      // Clamp: [0..inputHistory.length]
      if (historyCursor < 0) historyCursor = 0;
      if (historyCursor > inputHistory.length) historyCursor = inputHistory.length;

      if (historyCursor === inputHistory.length) {
        // Restore draft and exit history mode
        applyPromptValue(draftBeforeHistory ?? "", "end");
        historyCursor = -1;
        draftBeforeHistory = null;
        return;
      }

      // ArrowUp-triggered navigation is more convenient with caret at start for repeated browsing.
      applyPromptValue(inputHistory[historyCursor] ?? "", direction < 0 ? "start" : "end");
    }

    if (event.key === "Enter") {
      if (event.shiftKey) {
        // Shift+回车：允许换行（默认行为）
        return;
      } else {
        // 回车：发送消息
        event.preventDefault();
        sendPrompt();
      }
    } else if (event.key === "ArrowUp" && noModifier) {
      if ((historyCursor !== -1 || isCaretCollapsedAtStart(promptInput)) && inputHistory.length > 0) {
        event.preventDefault();
        navigateHistory(-1);
      }
    } else if (event.key === "ArrowDown" && noModifier) {
      // Only navigate forward if we're already in history browsing mode
      if (historyCursor !== -1 || isCaretCollapsedAtEnd(promptInput)) {
        event.preventDefault();
        navigateHistory(1);
      }
    }
  });

  function addMessageBubble(msg, shouldConnect) {
    if (msg.role === "system") {
      addBubble(msg.content, "system", msg.meta, shouldConnect);
    } else if (msg.role === "user") {
      addBubble(msg.content, "user", msg.meta, false);
    } else if (msg.role === "assistant") {
      addBubble(msg.html || msg.content, "assistant", msg.meta, shouldConnect);
    } else if (msg.role === "tool") {
      addBubble(msg.content, "tool", msg.meta, shouldConnect);
    }
  }

  window.addEventListener("message", (event) => {
    const message = event.data;
    if (message.type === "initializeEmpty") {
      // 初始化空聊天
      clearMessages();
      if (sessionSelectorTitleText) {
        sessionSelectorTitleText.textContent = "New Conversation";
      }
      currentSessionId = null;
      currentSessionStatus = message.status || null;
      updateContextMeter(message.tokenTelemetry);
      attachmentManager?.clear();
      setLoading(false, currentSessionStatus);

      // Reset history for new conversation
      inputHistory = [];
      historyCursor = -1;
      draftBeforeHistory = null;
      pendingUserPrompt = null;
      // 如果消息中包含sessions，更新下拉框
      if (message.sessions && Array.isArray(message.sessions)) {
        updateSessionDropdown(message.sessions);
      } else if (allSessions.length > 0) {
        updateSessionDropdown(allSessions);
      }
    } else if (message.type === "loadSession") {
      // 加载已有对话
      currentSessionId = message.sessionId;
      currentSessionStatus = message.status || null;
      updateContextMeter(message.tokenTelemetry);
      if ('processes' in message) {
        currentRunningProcesses = message.processes;
      } else {
        currentRunningProcesses = null;
      }
      attachmentManager?.clear();
      clearMessages();
      if (sessionSelectorTitleText) {
        sessionSelectorTitleText.textContent = message.summary;
      }

      // 加载历史消息
      if (message.messages && Array.isArray(message.messages)) {
        // Rebuild user input history from session messages
        inputHistory = message.messages
          .filter((m) => m && m.role === "user" && typeof m.content === "string")
          .map((m) => m.content)
          .filter((t) => t && t.trim());
        historyCursor = -1;
        draftBeforeHistory = null;
        pendingUserPrompt = null;

        message.messages.forEach((msg, index) => {
          // 判断是否需要连接到上一个消息
          let shouldConnect = false;
          if (index > 0) {
            const prevMsg = message.messages[index - 1];
            shouldConnect = prevMsg.role !== "user" && msg.role !== "user";
          }
          addMessageBubble(msg, shouldConnect);
        });

        // 更新 lastMessageRole 为最后一条消息的role
        if (message.messages.length > 0) {
          lastMessageRole = message.messages[message.messages.length - 1].role;
        }

        // 批量更新所有连接线的高度
        requestAnimationFrame(() => {
          updateAllConnectionLines();
        });
        
        // 找最后一条 asThinking 为 true 的消息并展开
        const thinkingBubbles = messages.querySelectorAll('.bubble.assistant[data-thinking="true"]');
        if (thinkingBubbles.length > 0) {
          const lastThinkingBubble = thinkingBubbles[thinkingBubbles.length - 1];
          if (currentThinkingBubble && currentThinkingBubble !== lastThinkingBubble) {
            setThinkingBubbleExpanded(currentThinkingBubble, false);
          }
          setThinkingBubbleExpanded(lastThinkingBubble, true);
          currentThinkingBubble = lastThinkingBubble;
        }
      }
      
      // 设置会话状态
      const isCurrentlyProcessing = isBusyStatus(currentSessionStatus);
      setLoading(isCurrentlyProcessing, currentSessionStatus);
      
      // 如果消息中包含sessions，更新下拉框
      if (message.sessions && Array.isArray(message.sessions)) {
        updateSessionDropdown(message.sessions);
      } else if (allSessions.length > 0) {
        updateSessionDropdown(allSessions);
      }
    } else if (message.type === "showSessionsList") {
      // 更新对话列表下拉框
      updateSessionDropdown(message.sessions || []);
    } else if (message.type === "sessionStatus") {
      if (message.sessionId && currentSessionId && message.sessionId !== currentSessionId) {
        return;
      }
      const nextStatus = message.status || null;
      if ('processes' in message) {
        currentRunningProcesses = message.processes;
      }
      if ('tokenTelemetry' in message) {
        updateContextMeter(message.tokenTelemetry);
      }
      setLoading(isBusyStatus(nextStatus), nextStatus);
    } else if (message.type === "llmStreamProgress") {
      const progress = message.progress || null;
      if (!progress || !progress.requestId) {
        return;
      }
      if (progress.sessionId && currentSessionId && progress.sessionId !== currentSessionId) {
        return;
      }
      if (progress.phase === "end") {
        if (currentLlmStreamProgress && currentLlmStreamProgress.requestId === progress.requestId) {
          currentLlmStreamProgress = null;
        }
      } else {
        currentLlmStreamProgress = progress;
      }
      updateLoadingText();
    } else if (message.type === "userMessage") {
      // 显示用户消息（纯文本）
      addBubble(message.content || "", "user", message.meta, false);

      // Record user message into history
      if (typeof message.content === "string") {
        // Inline helper to avoid hoisting issues: duplicate minimal recording logic
        const text = message.content;
        const now = Date.now();
        if (pendingUserPrompt !== null && text === pendingUserPrompt) {
          inputHistory.push(text);
          pendingUserPrompt = null;
          lastHistoryRecordText = text;
          lastHistoryRecordAt = now;
        } else if (!(text === lastHistoryRecordText && (now - lastHistoryRecordAt) < 500) && text.trim()) {
          inputHistory.push(text);
          lastHistoryRecordText = text;
          lastHistoryRecordAt = now;
          pendingUserPrompt = null;
        }
      }
    } else if (message.type === "assistant") {
      // 接收助手回复
      const shouldConnect = lastMessageRole !== null && lastMessageRole !== "user";
      addBubble(message.html || "", "assistant", message.meta, shouldConnect);
    } else if (message.type === "loading") {
      // 加载状态
      const newStatus = message.value ? "processing" : currentSessionStatus;
      setLoading(Boolean(message.value), newStatus);
    } else if(message.type === "appendMessage") {
      // 新增消息
      addMessageBubble(message.message, message.shouldConnect);

      // Record appended user message into history (when backend sends user messages via appendMessage)
      if (message.message && message.message.role === "user" && typeof message.message.content === "string") {
        const text = message.message.content;
        const now = Date.now();
        if (pendingUserPrompt !== null && text === pendingUserPrompt) {
          inputHistory.push(text);
          pendingUserPrompt = null;
          lastHistoryRecordText = text;
          lastHistoryRecordAt = now;
        } else if (!(text === lastHistoryRecordText && (now - lastHistoryRecordAt) < 500) && text.trim()) {
          inputHistory.push(text);
          lastHistoryRecordText = text;
          lastHistoryRecordAt = now;
          pendingUserPrompt = null;
        }
      }
      
      // 如果是普通 assistant 消息（不是思考），说明本轮回复已完成，标记为 completed
      if (message.message.role === "assistant" && message.message.meta?.asThinking !== true) {
        currentSessionStatus = "completed";
        setLoading(false, currentSessionStatus);
      }
      
      // 如果是新的 asThinking 为 true 的消息，展开最新的思考气泡
      if (message.message.role === "assistant" && message.message.meta?.asThinking === true) {
        // 找最后一条 thinking 气泡
        const thinkingBubbles = messages.querySelectorAll('.bubble.assistant[data-thinking="true"]');
        if (thinkingBubbles.length > 0) {
          const lastThinkingBubble = thinkingBubbles[thinkingBubbles.length - 1];
          if (currentThinkingBubble && currentThinkingBubble !== lastThinkingBubble) {
            setThinkingBubbleExpanded(currentThinkingBubble, false);
          }
          setThinkingBubbleExpanded(lastThinkingBubble, true);
          currentThinkingBubble = lastThinkingBubble;
        }
      }
    } else if (message.type === "skillsList") {
      // 接收可用技能列表
      availableSkills = message.skills || [];
      updateSkillsButtonTooltip();
    } else if (message.type === "settingsState") {
      updateModelToolbar(message.state);
    }
  });

  // 监听窗口大小变化，重新计算连接线
  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      updateAllConnectionLines();
    }, 100);
  });

  // webview 准备就绪，请求初始数据
  vscode.postMessage({ type: "ready" });

  // 请求可用技能列表
  vscode.postMessage({ type: "requestSkills" });
  vscode.postMessage({ type: "requestSettingsState" });
</script>
</body>
</html>
