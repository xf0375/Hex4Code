<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>

  <!-- Elephant outline (scaled from 512×384 to 128×128) -->
  <g transform="translate(4,4) scale(0.25)">
    <path d="M100 120
             C100 60, 180 40, 256 40
             C332 40, 412 60, 412 120
             L412 280 L360 280 L360 220
             L256 220 L180 220 L180 280
             L120 280 L120 200 L100 200
             L100 120
             M256 40 L256 100"
          fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- HEX4 -->
    <text x="256" y="172" font-family="'SF Mono','JetBrains Mono','Courier New',monospace"
          font-size="72" font-weight="900" text-anchor="middle" fill="url(#accent)">HEX4</text>
  </g>
</svg>
